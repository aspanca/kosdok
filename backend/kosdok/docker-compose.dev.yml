services:
  mysql:
    image: mysql:8.4
    container_name: kosdok-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kosdok
      MYSQL_USER: kosdok
      MYSQL_PASSWORD: kosdok
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kosdok_mysql_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: kosdok-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  kosdok_mysql_data:
